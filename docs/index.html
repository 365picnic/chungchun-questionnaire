<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>청춘한의원 사전문진</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif; background: linear-gradient(135deg, #e8f0fe 0%, #f3e8ff 100%); color: #333; min-height: 100vh; }
.container { max-width: 600px; margin: 0 auto; background: #fff; min-height: 100vh; padding: 24px; border-radius: 0; box-shadow: 0 0 30px rgba(0,0,0,0.06); }
.header { text-align: center; padding: 20px 0; margin-bottom: 20px; background: linear-gradient(135deg, #1a3a6b, #3a7bd5); border-radius: 16px; }
.header h1 { color: #fff; font-size: 22px; margin-bottom: 4px; }
.header .sub { color: rgba(255,255,255,0.8); font-size: 13px; }
.progress-bar { width: 100%; height: 8px; background: #e8ecf1; border-radius: 4px; margin-bottom: 8px; overflow: hidden; }
.progress-fill { height: 100%; background: linear-gradient(90deg, #3a7bd5, #6c5ce7); border-radius: 4px; transition: width 0.4s ease; }
.progress-text { text-align: right; font-size: 12px; color: #888; margin-bottom: 16px; }
.step-info { font-size: 14px; color: #555; margin-bottom: 16px; font-weight: 500; display: flex; align-items: center; gap: 8px; }
.step-info .cat { background: linear-gradient(135deg, #6c5ce7, #3a7bd5); color: #fff; padding: 4px 14px; border-radius: 20px; font-size: 13px; font-weight: 600; }
.step-info .num { color: #999; font-size: 13px; }

.form-group { margin-bottom: 18px; }
.form-group label { display: block; font-weight: 600; font-size: 14px; margin-bottom: 8px; color: #444; }
.form-group input { width: 100%; padding: 14px; border: 2px solid #e0e4ea; border-radius: 12px; font-size: 16px; transition: border-color 0.2s; }
.form-group input:focus { outline: none; border-color: #6c5ce7; box-shadow: 0 0 0 3px rgba(108,92,231,0.1); }
.gender-btns { display: flex; gap: 12px; }
.gender-btn { flex: 1; padding: 14px; text-align: center; border: 2px solid #e0e4ea; border-radius: 12px; font-size: 16px; cursor: pointer; transition: all 0.2s; font-weight: 500; }
.gender-btn:hover { border-color: #6c5ce7; background: #f8f5ff; }
.gender-btn.selected { background: linear-gradient(135deg, #6c5ce7, #3a7bd5); color: #fff; border-color: transparent; box-shadow: 0 4px 12px rgba(108,92,231,0.3); }
.consent-row { display: flex; align-items: center; gap: 10px; padding: 14px; border: 2px solid #e0e4ea; border-radius: 12px; margin-bottom: 10px; }
.consent-row input[type="checkbox"] { width: 20px; height: 20px; accent-color: #6c5ce7; }
.consent-row label { font-size: 14px; flex: 1; }

.question-title { font-size: 20px; font-weight: 700; margin-bottom: 20px; line-height: 1.5; color: #2d3436; }

.opt { padding: 15px 18px; border: 2px solid #e0e4ea; border-radius: 14px; font-size: 15px; text-align: left; cursor: pointer; transition: all 0.2s; background: #fff; line-height: 1.5; margin-bottom: 10px; }
.opt:hover { border-color: #6c5ce7; background: #f8f5ff; transform: translateY(-1px); }
.opt.sel { background: linear-gradient(135deg, #3a7bd5, #6c5ce7); color: #fff; border-color: transparent; box-shadow: 0 4px 14px rgba(58,123,213,0.3); }

.sub-hdr { background: linear-gradient(135deg, #6c5ce7, #a855f7); color: #fff; padding: 12px 18px; font-size: 15px; font-weight: 600; margin: 4px 0 10px 20px; border-radius: 12px; }

.sub-opt { padding: 13px 16px; border: 2px solid #ddd8f0; border-radius: 12px; font-size: 14px; text-align: left; cursor: pointer; background: #faf8ff; line-height: 1.4; margin-bottom: 8px; margin-left: 20px; transition: all 0.2s; }
.sub-opt:hover { border-color: #a855f7; background: #f3eeff; }
.sub-opt.sel { background: linear-gradient(135deg, #a855f7, #6c5ce7); color: #fff; border-color: transparent; box-shadow: 0 3px 10px rgba(168,85,247,0.25); }

.sub-chk { padding: 13px 16px; border: 2px solid #ddd8f0; border-radius: 12px; font-size: 14px; cursor: pointer; background: #faf8ff; line-height: 1.4; margin-bottom: 8px; margin-left: 20px; display: flex; align-items: center; gap: 10px; transition: all 0.2s; }
.sub-chk:hover { border-color: #a855f7; background: #f3eeff; }
.sub-chk.sel { background: #ede5ff; border-color: #a855f7; }
.sub-chk .chkbox { width: 22px; height: 22px; border: 2px solid #a855f7; border-radius: 6px; display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.2s; }
.sub-chk.sel .chkbox { background: #a855f7; }
.sub-chk.sel .chkbox::after { content: '\2713'; color: #fff; font-size: 13px; font-weight: 700; }

.sub-block { margin-bottom: 12px; }

.nav-btns { display: flex; gap: 12px; margin-top: 28px; padding-bottom: 24px; }
.nav-btn { flex: 1; padding: 16px; text-align: center; font-size: 16px; font-weight: 600; cursor: pointer; border: none; border-radius: 14px; transition: all 0.2s; }
.nav-btn.prev { background: #f0f0f0; color: #555; }
.nav-btn.prev:hover { background: #e0e0e0; }
.nav-btn.next { background: linear-gradient(135deg, #3a7bd5, #6c5ce7); color: #fff; box-shadow: 0 4px 14px rgba(58,123,213,0.3); }
.nav-btn.next:hover { box-shadow: 0 6px 20px rgba(58,123,213,0.4); transform: translateY(-1px); }
.nav-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none !important; box-shadow: none !important; }

.complete-page { text-align: center; padding: 60px 20px; }
.complete-page .icon { font-size: 64px; margin-bottom: 20px; color: #27ae60; }
.complete-page h2 { font-size: 22px; margin-bottom: 12px; color: #2d3436; }
.complete-page p { color: #666; font-size: 15px; line-height: 1.7; }
.complete-page.error .icon { color: #e74c3c; }

.start-screen { text-align: center; padding: 40px 20px; }
.start-screen h2 { font-size: 26px; color: #2d3436; margin-bottom: 16px; }
.start-screen p { color: #666; font-size: 14px; line-height: 1.6; margin-bottom: 8px; }
.start-screen .warn { color: #e74c3c; font-size: 13px; margin-top: 16px; font-weight: 500; background: #fff5f5; padding: 10px 16px; border-radius: 10px; border: 1px solid #fecaca; }
.start-btn { width: 100%; padding: 16px; background: linear-gradient(135deg, #3a7bd5, #6c5ce7); color: #fff; border: none; border-radius: 14px; font-size: 18px; font-weight: 600; cursor: pointer; margin-top: 30px; box-shadow: 0 4px 14px rgba(58,123,213,0.3); transition: all 0.2s; }
.start-btn:hover { box-shadow: 0 6px 20px rgba(58,123,213,0.4); transform: translateY(-1px); }
.start-btn:disabled { opacity: 0.5; cursor: not-allowed; }

/* Emotion card style */
.emo-card { background: #f8f9fc; border-radius: 14px; overflow: hidden; margin-bottom: 14px; }
.emo-card-inner { display: flex; min-height: 130px; }
.emo-icon { width: 130px; min-height: 130px; display: flex; align-items: center; justify-content: center; font-size: 60px; flex-shrink: 0; }
.emo-checks { flex: 1; display: flex; flex-direction: column; justify-content: center; padding: 14px 18px; gap: 10px; }
.emo-chk { display: flex; align-items: center; gap: 10px; cursor: pointer; font-size: 14px; line-height: 1.4; padding: 6px 0; }
.emo-chk .ebox { width: 22px; height: 22px; border: 2px solid #b0b8c9; border-radius: 6px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.15s; background: #fff; }
.emo-chk.sel .ebox { background: #6c5ce7; border-color: #6c5ce7; }
.emo-chk.sel .ebox::after { content: '\2713'; color: #fff; font-size: 13px; font-weight: 700; }
.emo-hint { color: #e74c3c; font-size: 12px; margin-top: 8px; font-weight: 500; }

/* Symptom entry */
.symptom-entry { background: #f8f9fc; border-radius: 14px; padding: 20px; margin-bottom: 12px; }
.symptom-entry .se-label { font-weight: 600; font-size: 14px; margin-bottom: 6px; color: #444; }
.symptom-entry textarea { width: 100%; padding: 12px; border: 2px solid #e0e4ea; border-radius: 10px; font-size: 15px; resize: vertical; min-height: 60px; font-family: inherit; }
.symptom-entry textarea:focus { outline: none; border-color: #6c5ce7; }
.add-symptom-btn { width: 100%; padding: 12px; border: 2px dashed #b0b8c9; border-radius: 12px; background: #fff; font-size: 15px; color: #666; cursor: pointer; margin-bottom: 12px; transition: all 0.2s; }
.add-symptom-btn:hover { border-color: #6c5ce7; color: #6c5ce7; }
.remove-symptom { background: #e74c3c; color: #fff; border: none; border-radius: 8px; padding: 6px 12px; font-size: 12px; cursor: pointer; float: right; margin-bottom: 8px; }
</style>
</head>
<body>
<div class="container" id="app">
    <div id="phase-login">
        <div class="header">
            <h1>청춘한의원</h1>
            <div class="sub">사전문진시스템</div>
        </div>
        <div class="form-group">
            <label>이름</label>
            <input type="text" id="inp-name" placeholder="이름을 입력해주세요">
        </div>
        <div class="form-group">
            <label>전화번호</label>
            <input type="tel" id="inp-phone" placeholder="01012345678">
        </div>
        <button class="start-btn" onclick="goToRegister()">시작하기</button>
    </div>

    <div id="phase-register" style="display:none">
        <div class="header"><h1>신규등록</h1></div>
        <p style="font-size:14px;color:#666;margin-bottom:16px;line-height:1.6;">
            안녕하세요!<br>
            청춘한의원에 방문하신 것을 환영합니다.<br>
            보다 체계적인 의료서비스를 제공하기 위해 사전문진을 진행하고 있습니다.<br>
            가볍게, 기본정보부터 알려주시겠어요?
        </p>
        <div class="form-group">
            <label>생년월일</label>
            <input type="date" id="inp-birth" max="9999-12-31" min="1900-01-01">
        </div>
        <div class="form-group">
            <label>키 (cm)</label>
            <input type="number" id="inp-height" placeholder="170">
        </div>
        <div class="form-group">
            <label>몸무게 (kg)</label>
            <input type="number" id="inp-weight" placeholder="65">
        </div>
        <div class="form-group">
            <label>성별</label>
            <div class="gender-btns">
                <div class="gender-btn" onclick="selectGender(this,'남자')">남자</div>
                <div class="gender-btn" onclick="selectGender(this,'여자')">여자</div>
            </div>
        </div>
        <div class="consent-row">
            <input type="checkbox" id="consent1" checked>
            <label for="consent1">개인정보수집활용 동의 (필수)</label>
        </div>
        <button class="start-btn" onclick="goToStart()">다음</button>
    </div>

    <div id="phase-start" style="display:none">
        <div class="header"><h1>청춘한의원</h1></div>
        <div class="start-screen">
            <h2>내 몸의 맞춤진단</h2>
            <p class="warn">마지막 페이지에서 "문진완료" 버튼을 누르셔야 문진이 완료됩니다.</p>
            <button class="start-btn" onclick="startQuestionnaire()">문진시작하기</button>
        </div>
    </div>

    <div id="phase-questions" style="display:none">
        <div class="header" style="padding:10px 0;">
            <h1 style="font-size:16px;">청춘한의원</h1>
        </div>
        <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
        <div class="progress-text" id="progress-text">진행률 0%</div>
        <div id="question-area"></div>
        <div class="nav-btns">
            <button class="nav-btn prev" id="btn-prev" onclick="prevQuestion()">이전</button>
            <button class="nav-btn next" id="btn-next" onclick="nextQuestion()">다음</button>
        </div>
    </div>

    <div id="phase-complete" style="display:none">
        <div class="header"><h1>청춘한의원</h1></div>
        <div class="complete-page" id="complete-box">
            <div class="icon">&#10004;</div>
            <h2>문진이 완료되었습니다</h2>
            <p>답변해주셔서 감사합니다.<br>원장님께서 확인 후 진료를 시작하겠습니다.<br>잠시만 기다려주세요.</p>
        </div>
    </div>
</div>

<script>
// ===== 구글시트 연동 주소 (Apps Script 배포 후 이 값을 교체하세요) =====
const GAS_URL = "https://script.google.com/macros/s/AKfycbzp_jMJK3Bq1mfwqa39mYQJdgIdKWkkIrrXaifMD3JY8QvzeWjyIlrpVwG-m7b70-RM/exec";

let selectedGender = null;
let currentStep = 0;
let answers = {};
let patientInfo = {};

const Q = [
{id:"sleep_main",cat:"잠",title:"잠을",type:"single",
 opts:["잘 자는 편","못 자는 편"],
 sub:{"못 자는 편":[
   {id:"sleep_severity",title:"어느 정도 못 주무시나요?",type:"single",opts:["매우 못자는 편","어느 정도","약간"]},
   {id:"sleep_wake",title:"",type:"multi",opts:["잠은 드는데 자다가 자주 깬다"]}
 ]}},

{id:"sleep_important",cat:"잠",title:"내일 중요한 일 있으면?",type:"single",
 opts:["1~2시간 이상 한참 뒤척이다 겨우 자곤 한다","그래도 30분 전후로 잠드는 편이다"],
 sub:{"1~2시간 이상 한참 뒤척이다 겨우 자곤 한다":[
   {id:"sleep_imp_freq",title:"10번이면",type:"single",opts:["10~7번 정도","5번 전후","3~1번 정도 그럴 때가 있다"]},
   {id:"sleep_imp_extra",title:"",type:"multi",opts:["거의 못 자기도 한다","자다가 자주 깬다"]}
 ],"그래도 30분 전후로 잠드는 편이다":[
   {id:"sleep_ok_extra",title:"",type:"multi",opts:["자려고 마음 먹으면 잔다","살면서 잠이 안와서 힘든 적은 많지 않다"]}
 ]}},

{id:"sleep_coffee",cat:"잠",title:"커피 마시면?",type:"single",
 opts:["그래도 잘 자는 편","못 자는 편"]},

{id:"sleep_coffee_heart",cat:"잠",title:"커피를 마시면 가슴이 두근거리거나 손이 떨릴 때가 있다.",type:"single",
 opts:["예","아니오"]},

{id:"chest_palp",cat:"흉부",title:"가슴이 자주 두근거린다.",type:"single",
 opts:["예","아니오"],
 sub:{"예":[
   {id:"chest_palp_freq",title:"가슴 두근거림 빈도는?",type:"single",opts:["거의 매일","일주일 3~4번 정도","한달 3~4번 이하"]}
 ]}},

{id:"chest_tight",cat:"흉부",title:"(마음이 답답한게 아니라) 가슴이 막힌 듯 답답하다.",type:"single",
 opts:["예","아니오"],
 sub:{"예":[
   {id:"chest_tight_freq",title:"가슴 답답함 빈도는?",type:"single",opts:["거의 매일","일주일 3~4번 정도","한달 3~4번 이하"]},
   {id:"chest_tight_extra",title:"가슴이 답답하면?",type:"multi",opts:["잠이 더 안온다","한숨을 자주 쉰다","숨이 깊이 마셔지지 않는 느낌"]}
 ]}},

{id:"chest_compare",cat:"흉부",title:"가슴 두근거림, 답답함 어느 것이 더 심한가요?",type:"single",
 opts:["가슴 두근거림이 더 심","가슴 답답함이 더 심","비슷하다"],
 cond:function(){return answers["chest_palp"]==="예"&&answers["chest_tight"]==="예"}},

{id:"chest_pain",cat:"흉부",title:"가슴이 뻐근하게 아플 때가 많다.",type:"single",
 opts:["예","아니오"]},

{id:"stool_main",cat:"대변",title:"평소 대변은?",type:"single",
 opts:["거의 매일 정상변을 보는 편","변비 경향","설사~무른변 경향"],
 sub:{"변비 경향":[
   {id:"stool_const_sev",title:"변비 정도는?",type:"single",opts:["심한 편","어느 정도","약간"]},
   {id:"stool_const_extra",title:"해당하는 것을 선택해주세요.",type:"multi",opts:["대변 제때 못보면 가스가 많이 차서 더부룩 답답하다","설사를 해서라도 다 쏟아내면 너무 시원하고 좋겠다","대변이 굵고 단단해서 보기 힘들 때가 많다"]}
 ],"설사~무른변 경향":[
   {id:"stool_diarr_freq",title:"빈도는?",type:"single",opts:["거의 매일","일주일 3~4번 정도","한달 3~4번 이하"]},
   {id:"stool_diarr_cause",title:"어떨 때 설사~무른 변을 보나요?",type:"multi",opts:["찬 음식 먹으면","맵거나 자극적인 음식","기름기 많은 음식","술 많이 마시면","어떤 음식을 먹더라도 설사~무른변을 자주 보는 편"]}
 ]}},

{id:"stool_gas",cat:"대변",title:"평소 배에 가스가 많이 차서 헛배가 자주 부르나요?",type:"single",
 opts:["그렇다","아니다"],
 sub:{"그렇다":[
   {id:"stool_gas_freq",title:"빈도는?",type:"single",opts:["거의 매일","일주일 3~4번 정도","한달 3~4번 이하"]}
 ]}},

{id:"digest_main",cat:"소화",title:"평소 소화가?",type:"single",
 opts:["잘 되는 편","보통","잘 안되는 편"],
 sub:{"잘 안되는 편":[
   {id:"digest_sev",title:"어느 정도?",type:"single",opts:["매우 안되는 편","어느 정도"]},
   {id:"digest_cause",title:"어떨 때 소화가 안되나요?",type:"multi",opts:["내 기준에 정해진 양 이상 과식하면","신경쓰면 소화가 자주 안된다"]}
 ]}},

{id:"digest_symptom",cat:"소화",title:"소화가 안되면?",type:"multi",
 opts:["명치(위장)에서 음식이 내려가지 않는 듯 답답하다","가슴이나 목에서 음식이 내려가지 않는 듯 답답하다","소화가 안되면 식욕도 더 떨어지곤 한다","소화가 안 되더라도 식욕은 여전히 좋은 편이다"],
 cond:function(){return answers["digest_main"]==="잘 안되는 편"}},

{id:"appetite",cat:"소화",title:"평소 식욕이?",type:"single",
 opts:["매우 없는 편","없는 편","보통","좋은 편","매우 좋은 편"],
 sub:{"매우 좋은 편":[
   {id:"appetite_extra",title:"",type:"multi",opts:["배고픈 것을 못 참는다"]}
 ]}},

{id:"cold_heat_main",cat:"추위/더위",title:"평소 추위와 더위는?",type:"multi",
 opts:["추위를 타지 않는 편","몸이 차서 추위를 타는 편","열이 많아 더위를 타는 편"],
 sub:{"몸이 차서 추위를 타는 편":[

// id -> 질문 전체 텍스트(카테고리 포함 경로) 매핑 (요약 생성용)
const QMAP = {};
(function buildQMap(){
  Q.forEach(q => {
    QMAP[q.id] = {cat:q.cat, title:q.title};
    if (q.sub) {
      Object.keys(q.sub).forEach(k => {
        q.sub[k].forEach(sq => { QMAP[sq.id] = {cat:q.cat, title: sq.title || q.title}; });
      });
    }
    if (q.groups) {
      q.groups.forEach(g => g.items.forEach(it => { QMAP[it.id] = {cat:q.cat, title: it.text}; }));
    }
  });
})();

function visibleQ() { return Q.filter(q => !q.cond || q.cond()); }

function goToRegister() {
    const n = document.getElementById('inp-name').value.trim();
    const p = document.getElementById('inp-phone').value.trim();
    if (!n || !p) { alert('이름과 전화번호를 입력해주세요.'); return; }
    document.getElementById('phase-login').style.display = 'none';
    document.getElementById('phase-register').style.display = 'block';
}

function selectGender(el, g) {
    selectedGender = g;
    document.querySelectorAll('.gender-btn').forEach(b => b.classList.remove('selected'));
    el.classList.add('selected');
}

function goToStart() {
    const name = document.getElementById('inp-name').value.trim();
    const phone = document.getElementById('inp-phone').value.trim();
    const birth = document.getElementById('inp-birth').value;
    const height = document.getElementById('inp-height').value;
    const weight = document.getElementById('inp-weight').value;
    if (!selectedGender) { alert('성별을 선택해주세요.'); return; }
    if (!document.getElementById('consent1').checked) { alert('개인정보수집 동의가 필요합니다.'); return; }
    if (birth) {
        const y = parseInt(birth.split('-')[0], 10);
        if (y > 9999 || y < 1900) { alert('생년월일의 연도를 4자리로 입력해주세요.'); return; }
    }
    patientInfo = {name, phone, birth_date: birth, height: parseFloat(height) || '', weight: parseFloat(weight) || '', gender: selectedGender};
    document.getElementById('phase-register').style.display = 'none';
    document.getElementById('phase-start').style.display = 'block';
}

function startQuestionnaire() {
    document.getElementById('phase-start').style.display = 'none';
    document.getElementById('phase-questions').style.display = 'block';
    currentStep = 0;
    render();
}

function esc(s) { return s.replace(/'/g, "\\'").replace(/"/g, '&quot;'); }

function isSelected(qId, opt, type) {
    if (type === 'single') return answers[qId] === opt;
    return (answers[qId] || []).includes(opt);
}

function renderSubBlock(subQuestions) {
    let h = '';
    subQuestions.forEach(sq => {
        if (sq.title) {
            h += `<div class="sub-hdr">${sq.title}</div>`;
        }
        if (sq.type === 'single') {
            sq.opts.forEach(o => {
                const s = isSelected(sq.id, o, 'single') ? ' sel' : '';
                h += `<div class="sub-opt${s}" onclick="pick('${sq.id}','${esc(o)}','single')">${o}</div>`;
            });
        } else if (sq.type === 'multi') {
            sq.opts.forEach(o => {
                const s = isSelected(sq.id, o, 'multi') ? ' sel' : '';
                h += `<div class="sub-chk${s}" onclick="pick('${sq.id}','${esc(o)}','multi')"><span class="chkbox"></span>${o}</div>`;
            });
        }
    });
    return h;
}

function render() {
    const list = visibleQ();
    const total = list.length;
    const q = list[currentStep];
    const pct = Math.round((currentStep / total) * 100);
    document.getElementById('progress-fill').style.width = pct + '%';
    document.getElementById('progress-text').textContent = '진행률 ' + pct + '%';

    let h = '';
    h += `<div class="step-info"><span class="cat">${q.cat}</span> <span class="num">${currentStep + 1} /${total}</span></div>`;
    h += `<div class="question-title">${q.title}</div>`;

    if (q.type === 'text') {
        h += `<textarea id="text-answer" style="width:100%;height:120px;padding:12px;border:1px solid #ddd;border-radius:8px;font-size:15px;resize:vertical;" placeholder="자유롭게 적어주세요...">${answers[q.id]||''}</textarea>`;
    } else if (q.type === 'single') {
        q.opts.forEach(o => {
            const s = isSelected(q.id, o, 'single') ? ' sel' : '';
            h += `<div class="opt${s}" onclick="pick('${q.id}','${esc(o)}','single')">${o}</div>`;
            if (s && q.sub && q.sub[o]) {
                h += `<div class="sub-block">${renderSubBlock(q.sub[o])}</div>`;
            }
        });
    } else if (q.type === 'multi') {
        q.opts.forEach(o => {
            const s = isSelected(q.id, o, 'multi') ? ' sel' : '';
            h += `<div class="opt${s}" onclick="pick('${q.id}','${esc(o)}','multi')">${o}</div>`;
            if (s && q.sub && q.sub[o]) {
                h += `<div class="sub-block">${renderSubBlock(q.sub[o])}</div>`;
            }
        });
    } else if (q.type === 'emotion') {
        q.groups.forEach(g => {
            h += `<div class="emo-card"><div class="emo-card-inner">`;
            h += `<div class="emo-icon" style="background:${g.bg};">${g.icon}</div>`;
            h += `<div class="emo-checks">`;
            g.items.forEach(item => {
                const checked = answers[item.id] === true;
                const sel = checked ? ' sel' : '';
                h += `<div class="emo-chk${sel}" onclick="toggleEmo('${item.id}')"><span class="ebox"></span>${item.text}</div>`;
            });
            h += `</div></div></div>`;
        });
        h += `<div class="emo-hint">해당사항이 없다면, 다음을 눌러주세요.</div>`;
    } else if (q.type === 'symptom_entry') {
        h += renderSymptomEntry();
    }

    document.getElementById('question-area').innerHTML = h;
    document.getElementById('btn-prev').disabled = currentStep === 0;
    document.getElementById('btn-next').textContent = currentStep === total - 1 ? '문진완료' : '다음';
    document.getElementById('btn-next').disabled = false;
}

function pick(qId, val, type) {
    val = val.replace(/\\'/g, "'");
    const isNA = val === '해당없음' || val === '해당 없음';
    if (type === 'single') {
        if (answers[qId] === val) {
            delete answers[qId];
        } else {
            answers[qId] = val;
        }
    } else {
        if (!answers[qId]) answers[qId] = [];
        const i = answers[qId].indexOf(val);
        if (i > -1) {
            answers[qId].splice(i, 1);
        } else {
            if (isNA) {
                answers[qId] = [val];
            } else {
                answers[qId] = answers[qId].filter(v => v !== '해당없음' && v !== '해당 없음');
                answers[qId].push(val);
            }
        }
        if (answers[qId].length === 0) delete answers[qId];
    }
    render();
}

function toggleEmo(itemId) {
    answers[itemId] = !answers[itemId];
    if (!answers[itemId]) delete answers[itemId];
    render();
}

// Symptom entry
if (!window._symptoms) window._symptoms = [{symptom:'',since:'',how:''}];

function renderSymptomEntry() {
    let h = '';
    window._symptoms.forEach((s, i) => {
        h += `<div class="symptom-entry">`;
        if (window._symptoms.length > 1) {
            h += `<button class="remove-symptom" onclick="removeSymptom(${i})">삭제</button>`;
        }
        h += `<div class="se-label">증상</div>`;
        h += `<textarea id="se-symptom-${i}" placeholder="예: 허리가 아프다" oninput="updateSymptom(${i},'symptom',this.value)">${s.symptom}</textarea>`;
        h += `<div class="se-label" style="margin-top:10px;">대략 언제부터 그랬나요?</div>`;
        h += `<textarea id="se-since-${i}" placeholder="예: 3개월 전부터" oninput="updateSymptom(${i},'since',this.value)">${s.since}</textarea>`;
        h += `<div class="se-label" style="margin-top:10px;">어떻게 아픈가요?</div>`;
        h += `<textarea id="se-how-${i}" placeholder="예: 오래 앉아있으면 더 아프다" oninput="updateSymptom(${i},'how',this.value)">${s.how}</textarea>`;
        h += `</div>`;
    });
    h += `<div class="add-symptom-btn" onclick="addSymptom()">+ 증상 추가</div>`;
    return h;
}

function updateSymptom(i, field, val) {
    window._symptoms[i][field] = val;
}

function addSymptom() {
    window._symptoms.push({symptom:'',since:'',how:''});
    render();
}

function removeSymptom(i) {
    window._symptoms.splice(i, 1);
    render();
}

function saveSymptomAnswers() {
    const filled = window._symptoms.filter(s => s.symptom.trim() || s.since.trim() || s.how.trim());
    if (filled.length > 0) {
        answers['symptoms'] = filled;
    }
}

function prevQuestion() {
    if (currentStep > 0) { currentStep--; render(); window.scrollTo(0, 0); }
}

function nextQuestion() {
    const list = visibleQ();
    const q = list[currentStep];
    if (q.type === 'text') {
        const ta = document.getElementById('text-answer');
        if (ta && ta.value) answers[q.id] = ta.value;
    }
    if (q.type === 'symptom_entry') {
        saveSymptomAnswers();
    }
    if (currentStep < list.length - 1) { currentStep++; render(); window.scrollTo(0, 0); }
    else { saveSymptomAnswers(); submit(); }
}

// 답변을 사람이 읽기 쉬운 텍스트로 정리 (구글시트에 표시될 내용)
function buildSummary() {
    const lines = [];
    let curCat = null;
    visibleQ().forEach(q => {
        if (q.type === 'symptom_entry') return;
        if (q.type === 'emotion') {
            q.groups.forEach(g => g.items.forEach(it => {
                if (answers[it.id]) lines.push(`[${q.cat}] ${it.text}`);
            }));
            return;
        }
        const val = answers[q.id];
        if (val === undefined) return;
        const valText = Array.isArray(val) ? val.join(', ') : val;
        lines.push(`[${q.cat}] ${q.title}: ${valText}`);
        if (q.sub) {
            const chosen = Array.isArray(val) ? val : [val];
            chosen.forEach(v => {
                if (q.sub[v]) {
                    q.sub[v].forEach(sq => {
                        const sv = answers[sq.id];
                        if (sv === undefined) return;
                        const svText = Array.isArray(sv) ? sv.join(', ') : sv;
                        const label = sq.title || '  ↳';
                        lines.push(`   - ${label}: ${svText}`);
                    });
                }
            });
        }
    });
    return lines.join('\n');
}

function buildSymptomText() {
    if (!answers['symptoms']) return '';
    return answers['symptoms'].map((s, i) =>
        `${i+1}. 증상: ${s.symptom || '-'} / 언제부터: ${s.since || '-'} / 양상: ${s.how || '-'}`
    ).join('\n');
}

function submit() {
    document.getElementById('btn-next').disabled = true;
    document.getElementById('btn-next').textContent = '제출 중...';

    const payload = {
        name: patientInfo.name,
        phone: patientInfo.phone,
        birth_date: patientInfo.birth_date,
        height: patientInfo.height,
        weight: patientInfo.weight,
        gender: patientInfo.gender,
        summary: buildSummary(),
        symptoms: buildSymptomText(),
        raw: JSON.stringify(answers)
    };

    // Apps Script 웹앱은 CORS 응답 헤더를 주지 않아 응답을 읽으려 하면 실패 처리되므로
    // mode:'no-cors'로 보내 응답을 읽지 않고 전송 성공 여부만 확인한다.
    fetch(GAS_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) })
        .then(() => showComplete(true))
        .catch(() => showComplete(false));
}

function showComplete(ok) {
    document.getElementById('phase-questions').style.display = 'none';
    document.getElementById('phase-complete').style.display = 'block';
    const box = document.getElementById('complete-box');
    if (ok) {
        box.classList.remove('error');
        box.innerHTML = `<div class="icon">&#10004;</div><h2>문진이 완료되었습니다</h2><p>답변해주셔서 감사합니다.<br>원장님께서 확인 후 진료를 시작하겠습니다.<br>잠시만 기다려주세요.</p>`;
    } else {
        box.classList.add('error');
        box.innerHTML = `<div class="icon">&#10060;</div><h2>제출 중 문제가 발생했습니다</h2><p>네트워크 연결을 확인하시고,<br>계속 안되면 접수처 직원에게 알려주세요.</p>`;
    }
}
