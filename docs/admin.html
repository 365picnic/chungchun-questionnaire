<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>청춘한의원 - 문진 관리</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif; background: #f3f5fa; color: #26304a; }

/* ===== 잠금 화면 ===== */
#lock-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #1a3a6b, #3a7bd5); }
.lock-box { background: #fff; border-radius: 20px; padding: 40px 36px; width: 100%; max-width: 340px; box-shadow: 0 20px 50px rgba(0,0,0,0.25); text-align: center; }
.lock-box h1 { font-size: 18px; margin-bottom: 4px; }
.lock-box .sub { font-size: 13px; color: #888; margin-bottom: 22px; }
.lock-box input { width: 100%; padding: 13px 14px; border: 2px solid #e0e4ea; border-radius: 12px; font-size: 15px; margin-bottom: 12px; }
.lock-box input:focus { outline: none; border-color: #6c5ce7; }
.lock-box button { width: 100%; padding: 13px; background: linear-gradient(135deg, #3a7bd5, #6c5ce7); color: #fff; border: none; border-radius: 12px; font-size: 15px; font-weight: 600; cursor: pointer; }
.lock-box .err { color: #e74c3c; font-size: 12.5px; margin-top: 10px; min-height: 16px; }

/* ===== 대시보드 ===== */
#dash { display: none; }
.topbar { background: #fff; border-bottom: 1px solid #e2e6ee; padding: 10px 22px; display: flex; justify-content: space-between; align-items: center; height: 52px; }
.topbar .brand { font-weight: 700; font-size: 15px; color: #1a3a6b; }
.topbar .brand span { color: #6c5ce7; }
.topbar .right { display: flex; align-items: center; gap: 14px; font-size: 12.5px; color: #888; }
.topbar button { background: #3a7bd5; color: #fff; border: none; padding: 7px 16px; border-radius: 8px; cursor: pointer; font-size: 12.5px; font-weight: 600; }
.topbar button:hover { background: #2f66b3; }

.layout { display: flex; height: calc(100vh - 52px); }
.sidebar { width: 300px; background: #fff; border-right: 1px solid #e2e6ee; display: flex; flex-direction: column; }
.sidebar-hdr { padding: 12px; border-bottom: 1px solid #eef0f5; }
.sidebar-hdr input { width: 100%; padding: 9px 12px; border: 1px solid #dfe3ec; border-radius: 8px; font-size: 13px; }
.sidebar-hdr input:focus { outline: none; border-color: #6c5ce7; }
.p-list { flex: 1; overflow-y: auto; }
.p-item { padding: 12px 16px; border-bottom: 1px solid #f2f4f8; cursor: pointer; }
.p-item:hover { background: #f6f8fd; }
.p-item.active { background: #ecf1fb; border-left: 3px solid #3a7bd5; padding-left: 13px; }
.p-item .nm { font-weight: 700; font-size: 13.5px; display: flex; align-items: center; gap: 6px; }
.p-item .nm .gender-tag { font-size: 10.5px; font-weight: 600; padding: 1px 6px; border-radius: 8px; background: #eef1f8; color: #6b7488; }
.p-item .inf { font-size: 11.5px; color: #8a92a6; margin-top: 3px; }
.p-item .tm { font-size: 10.5px; color: #b0b6c4; margin-top: 2px; }
.empty-list { padding: 30px 16px; text-align: center; color: #aaa; font-size: 13px; }

.detail { flex: 1; overflow-y: auto; padding: 26px 34px; }
.detail-empty { display: flex; align-items: center; justify-content: center; height: 100%; color: #aaa; font-size: 14px; }

.patient-card { background: #fff; border: 1px solid #e2e6ee; border-radius: 16px; padding: 20px 24px; margin-bottom: 18px; display: flex; flex-wrap: wrap; gap: 22px 34px; align-items: center; }
.patient-card .name { font-size: 20px; font-weight: 800; }
.patient-card .name .gender-tag { font-size: 11px; font-weight: 700; margin-left: 8px; padding: 2px 9px; border-radius: 10px; background: #eef1f8; color: #6c5ce7; vertical-align: middle; }
.patient-card .field { font-size: 12.5px; color: #8a92a6; }
.patient-card .field b { display: block; font-size: 14px; color: #26304a; font-weight: 700; margin-top: 2px; }

.bmi-section { background: #fff; border: 1px solid #e2e6ee; border-radius: 14px; padding: 16px 20px; margin-bottom: 18px; }
.bmi-section h3 { font-size: 13px; color: #3a7bd5; margin-bottom: 10px; }
.bmi-bar { display: flex; gap: 8px; align-items: flex-end; justify-content: center; flex-wrap: wrap; }
.bmi-item { display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 8px 8px 6px; border-radius: 10px; min-width: 72px; }
.bmi-circle { width: 66px; height: 66px; border-radius: 50%; background: #f3f5fa; display: flex; align-items: center; justify-content: center; border: 2px solid #e2e6ee; }
.bmi-circle-active { background: #e6ecfb; border: 3px solid #3a7bd5; box-shadow: 0 0 0 3px rgba(58,123,213,0.15); }
.bmi-item .bmi-label { font-size: 11px; color: #8a92a6; white-space: nowrap; font-weight: 600; }
.bmi-item .bmi-val { font-size: 10px; color: #b0b6c4; }
.bmi-item.active .bmi-label { color: #3a7bd5; }
.bmi-item.active .bmi-val { color: #3a7bd5; font-weight: 600; }
.bmi-note { font-size: 11.5px; color: #b0b6c4; text-align: center; margin-top: 8px; }

/* 형색성정: 성향/면색/붉은기/기타/안진 - 모두 원장님이 진료 중 직접 판단해 표시 (자동 아님) */
.hss-section { background: #fff; border: 1px solid #e2e6ee; border-radius: 14px; padding: 16px 20px; margin-bottom: 18px; }
.hss-section h3 { font-size: 13px; color: #3a7bd5; margin-bottom: 4px; }
.hss-section .sub { font-size: 11.5px; color: #b0b6c4; margin-bottom: 12px; }
.hss-two { display: flex; gap: 28px; }
.hss-left { flex: 1; min-width: 0; }
.hss-right { flex: 1.15; min-width: 0; }
.hss-sub { font-size: 11.5px; color: #26304a; font-weight: 700; margin: 12px 0 6px; }
.hss-sub:first-child { margin-top: 0; }
.dot-scale { display: flex; align-items: center; gap: 6px; }
.dot-scale .end-label { font-size: 11.5px; color: #8a92a6; font-weight: 600; min-width: 30px; }
.dot-scale .end-label.right { text-align: right; }
.dot-btn { width: 24px; height: 24px; border-radius: 50%; border: 2px solid #dfe3ec; background: #fff; cursor: pointer; transition: all .15s; flex-shrink: 0; }
.dot-btn:hover { border-color: #3a7bd5; }
.dot-btn.active { background: #1a3a6b; border-color: #1a3a6b; }
.tag-group { display: flex; gap: 6px; flex-wrap: wrap; }
.tag-btn { padding: 5px 12px; border: 1px solid #dfe3ec; border-radius: 8px; font-size: 11.5px; cursor: pointer; background: #fff; color: #26304a; transition: all .15s; }
.tag-btn:hover { border-color: #3a7bd5; }
.tag-btn.active { background: #3a7bd5; color: #fff; border-color: #3a7bd5; }
.anjin-title { font-size: 11.5px; color: #26304a; font-weight: 700; margin-bottom: 8px; }
.anjin-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 2px 16px; }
.anjin-item { display: flex; align-items: center; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid #f5f6fa; font-size: 11.5px; gap: 8px; }
.anjin-item .aj-name { color: #444; }
.star-group { display: flex; gap: 1px; flex-shrink: 0; }
.star-btn { font-size: 16px; color: #dfe3ec; cursor: pointer; line-height: 1; transition: color .1s; }
.star-btn.on { color: #f0c040; }
.star-btn:hover { color: #f0c040; }

.symptom-box { background: #fff7ec; border: 1px solid #f5e3bf; border-radius: 14px; padding: 16px 20px; margin-bottom: 18px; }
.symptom-box h3 { font-size: 13px; color: #b8860b; margin-bottom: 8px; }
.symptom-box pre { white-space: pre-wrap; font-family: inherit; font-size: 13.5px; line-height: 1.7; color: #5a4a1e; }

/* 두 칸 레이아웃: 왼쪽 문진 내용 / 오른쪽 주증상·메모 */
.two-col { display: flex; gap: 16px; align-items: flex-start; }
.col-main { flex: 1; min-width: 0; }
.col-side { width: 320px; flex-shrink: 0; }

.side-box { background: #fff; border: 1px solid #e2e6ee; border-radius: 14px; padding: 16px; margin-bottom: 18px; }
.side-box-hdr { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
.side-box-hdr h3 { font-size: 13px; color: #26304a; font-weight: 700; }
.side-btn { background: #3a7bd5; color: #fff; border: none; padding: 5px 12px; border-radius: 8px; font-size: 11.5px; font-weight: 600; cursor: pointer; }
.side-btn:hover { background: #2f66b3; }
.side-btn.ghost { background: #eef1f8; color: #3a7bd5; }
.side-btn.ghost:hover { background: #e2e8fb; }

.cc-card { border: 1px solid #eef0f5; border-radius: 10px; overflow: hidden; margin-bottom: 12px; }
.cc-card:last-child { margin-bottom: 0; }
.cc-remove { text-align: right; font-size: 10.5px; color: #e74c3c; cursor: pointer; padding: 4px 8px 0; }
.cc-row { display: flex; align-items: stretch; border-top: 1px solid #eef0f5; }
.cc-row:first-child { border-top: none; }
.cc-row.shaded { background: #f7f8fb; }
.cc-label { width: 60px; flex-shrink: 0; background: #8a92a6; color: #fff; font-size: 11px; font-weight: 700; display: flex; align-items: center; justify-content: center; text-align: center; padding: 6px 4px; }
.cc-input { flex: 1; border: none; background: transparent; font-size: 12.5px; padding: 8px 10px; resize: vertical; min-height: 34px; font-family: inherit; color: #26304a; }
.cc-input:focus { outline: none; background: #fbfcff; }

.memo-textarea { width: 100%; border: 1px solid #e2e6ee; border-radius: 10px; padding: 10px; font-size: 12.5px; resize: vertical; min-height: 90px; font-family: inherit; color: #26304a; }
.memo-textarea.big { min-height: 320px; }

.cat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 14px; margin-bottom: 20px; }
.cat-card { background: #fff; border: 1px solid #e2e6ee; border-radius: 14px; overflow: hidden; }
.cat-card .cat-hdr { background: linear-gradient(135deg, #3a7bd5, #6c5ce7); color: #fff; font-size: 12.5px; font-weight: 700; padding: 9px 16px; }
.cat-card .cat-body { padding: 12px 16px; }
.qa-row { font-size: 13px; line-height: 1.6; padding: 6px 0; border-bottom: 1px dashed #eef0f5; }
.qa-row:last-child { border-bottom: none; }
.qa-row .q { color: #6b7488; }
.qa-row .a { color: #26304a; font-weight: 600; }
.qa-sub { font-size: 12px; color: #8a92a6; padding: 2px 0 2px 12px; }
.qa-sub b { color: #4a5568; font-weight: 600; }

/* 문진 답변 수정 UI */
.save-bar { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
.save-bar button { background: linear-gradient(135deg, #3a7bd5, #6c5ce7); color: #fff; border: none; padding: 9px 20px; border-radius: 10px; font-size: 13px; font-weight: 700; cursor: pointer; }
.save-bar button:hover { opacity: .92; }
.save-status { font-size: 12px; color: #8a92a6; }
.save-status.ok { color: #27ae60; font-weight: 600; }
.save-status.err { color: #e74c3c; font-weight: 600; }
.edit-opts { display: flex; flex-wrap: wrap; gap: 3px 14px; margin: 3px 0 2px; }
.edit-opt, .edit-chk { display: inline-flex; align-items: center; gap: 5px; font-size: 12.5px; color: #26304a; cursor: pointer; }
.edit-opt input, .edit-chk input { width: 15px; height: 15px; accent-color: #3a7bd5; cursor: pointer; margin: 0; }
.qa-sub-block { margin: 2px 0 8px 14px; padding-left: 10px; border-left: 2px solid #eef0f5; }
.qa-sub-title { font-size: 11.5px; color: #6c5ce7; font-weight: 600; margin: 4px 0 2px; }

.raw-toggle { font-size: 12px; color: #aaa; cursor: pointer; margin-bottom: 8px; display: inline-block; }
.raw-box { display: none; background: #f6f7fb; border-radius: 10px; padding: 12px; font-family: ui-monospace, Consolas, monospace; font-size: 11.5px; color: #666; white-space: pre-wrap; word-break: break-all; margin-bottom: 20px; }

.status-line { font-size: 12px; color: #aaa; padding: 0 22px; }

@media (max-width: 1000px) {
  .two-col { flex-direction: column; }
  .col-side { width: 100%; }
  .hss-two { flex-direction: column; gap: 4px; }
  .anjin-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<div id="lock-screen">
  <div class="lock-box">
    <h1>청춘한의원</h1>
    <div class="sub">문진 관리 - 비밀번호를 입력해주세요</div>
    <input type="password" id="inp-key" placeholder="비밀번호" onkeydown="if(event.key==='Enter')unlock()">
    <button onclick="unlock()">확인</button>
    <div class="err" id="lock-err"></div>
  </div>
</div>

<div id="dash">
  <div class="topbar">
    <div class="brand">청춘한의원 <span>문진 관리</span></div>
    <div class="right">
      <span id="last-updated"></span>
      <button onclick="loadData()">새로고침</button>
    </div>
  </div>
  <div class="layout">
    <div class="sidebar">
      <div class="sidebar-hdr">
        <input type="text" id="search" placeholder="이름 또는 전화번호 검색" oninput="renderList()">
      </div>
      <div class="p-list" id="p-list"></div>
    </div>
    <div class="detail" id="detail">
      <div class="detail-empty">왼쪽 목록에서 환자를 선택해주세요.</div>
    </div>
  </div>
</div>

<script src="questions.js"></script>
<script>
// docs/index.html 의 GAS_URL 과 동일한 주소를 사용합니다.
const GAS_URL = "https://script.google.com/macros/s/AKfycbzp_jMJK3Bq1mfwqa39mYQJdgIdKWkkIrrXaifMD3JY8QvzeWjyIlrpVwG-m7b70-RM/exec";

let adminKey = sessionStorage.getItem('admin_key') || '';
let records = [];
let selectedIdx = null;

// 문진 답변 수정용 (questions.js 의 Q/visibleQ/buildSummary 가 참조하는 전역 변수).
// 환자를 새로 선택했을 때만 r.raw로 채우고, 그 이후 같은 환자를 다시 그릴 때는
// (원장님이 클릭해서 고친 내용이 사라지지 않도록) 이미 채워진 값을 그대로 씁니다.
let answers = {};
let selectedGender = null;
let editingRowNum = null;

// 주증상(CC)/진료메모/처방메모 - 원장님이 진료 중 직접 채워 넣는 항목.
// editingRowNum이 바뀔 때(환자를 새로 열 때)만 초기화합니다.
let doctorNotes = { cc: [], memo: '', prescription: '', tendency: null, myunsaek: null, bulgeun: null, gita: [], anjin: {} };

if (adminKey) tryLoadWithKey();

function unlock() {
  const k = document.getElementById('inp-key').value.trim();
  if (!k) return;
  adminKey = k;
  tryLoadWithKey();
}

// 구글시트가 "01090261075" 같은 전화번호를 숫자로 자동 인식해서 맨 앞 0이 사라지는 경우가 있어
// (이때 r.phone은 문자열이 아니라 숫자가 되어 .includes() 검색도 깨집니다), 불러온 직후 복구합니다.
function formatPhone(v) {
  if (v === undefined || v === null || v === '') return '';
  let s = String(v).trim();
  if (/^[1-9][0-9]{8,9}$/.test(s)) s = '0' + s;
  return s;
}
function normalizeRecord(r) { return Object.assign({}, r, { phone: formatPhone(r.phone) }); }

async function tryLoadWithKey() {
  document.getElementById('lock-err').textContent = '';
  try {
    const res = await fetch(GAS_URL + '?key=' + encodeURIComponent(adminKey));
    const text = await res.text();
    let data;
    try { data = JSON.parse(text); } catch (e) { data = null; }
    if (!Array.isArray(data)) {
      document.getElementById('lock-err').textContent = '비밀번호가 올바르지 않습니다.';
      sessionStorage.removeItem('admin_key');
      return;
    }
    sessionStorage.setItem('admin_key', adminKey);
    records = data.map(normalizeRecord);
    document.getElementById('lock-screen').style.display = 'none';
    document.getElementById('dash').style.display = 'block';
    renderList();
    updateTimestamp();
  } catch (e) {
    document.getElementById('lock-err').textContent = '서버에 연결할 수 없습니다. 네트워크를 확인해주세요.';
  }
}

async function loadData() {
  try {
    const res = await fetch(GAS_URL + '?key=' + encodeURIComponent(adminKey));
    const data = await res.json();
    if (Array.isArray(data)) {
      records = data.map(normalizeRecord);
      renderList();
      if (selectedIdx !== null) renderDetail(selectedIdx);
      updateTimestamp();
    }
  } catch (e) { /* 조용히 실패 - 다음 새로고침에서 재시도 */ }
}

function updateTimestamp() {
  const now = new Date();
  document.getElementById('last-updated').textContent =
    '마지막 새로고침 ' + now.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
}

function renderList() {
  const kw = (document.getElementById('search').value || '').trim();
  const list = document.getElementById('p-list');
  const filtered = records
    .map((r, i) => ({ r, i }))
    .filter(({ r }) => !kw || (r.name || '').includes(kw) || (r.phone || '').includes(kw));

  if (filtered.length === 0) {
    list.innerHTML = '<div class="empty-list">아직 접수된 문진이 없습니다.</div>';
    return;
  }

  list.innerHTML = filtered.map(({ r, i }) => {
    const dt = r.submittedAt ? new Date(r.submittedAt) : null;
    const dtText = dt ? dt.toLocaleString('ko-KR', { month: 'numeric', day: 'numeric', hour: '2-digit', minute: '2-digit' }) : '';
    const genderTag = r.gender ? `<span class="gender-tag">${r.gender}</span>` : '';
    return `<div class="p-item${i === selectedIdx ? ' active' : ''}" onclick="renderDetail(${i})">
      <div class="nm">${esc(r.name || '(이름없음)')} ${genderTag}</div>
      <div class="inf">${esc(r.phone || '')}</div>
      <div class="tm">${dtText}</div>
    </div>`;
  }).join('');
}

function esc(s) {
  return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

// ===== BMI 자동 계산 및 체형 그림 =====
function calcBMI(h, w) {
  h = parseFloat(h); w = parseFloat(w);
  if (!h || !w) return null;
  return w / ((h / 100) * (h / 100));
}

function getBMICategory(bmi) {
  if (!bmi) return -1;
  if (bmi < 18.5) return 0;
  if (bmi < 20) return 1;
  if (bmi < 23) return 2;
  if (bmi < 25) return 3;
  if (bmi < 27.5) return 4;
  if (bmi < 30) return 5;
  return 6;
}

function bodySVG(widthScale) {
  // widthScale 0(매우수척) ~ 1(매우비만) 에 따라 어깨/허리/엉덩이 너비가 커지는
  // 사람 실루엣(머리/팔/몸통/다리)을 그립니다.
  const cx = 30;
  const shoulderW = 13 + widthScale * 7;
  const waistW = 9 + widthScale * 15;
  const hipW = waistW * 0.92;
  const legGap = 3;
  const shoulderY = 24, waistY = 44, hipY = 52, legBottomY = 76;
  const legW = (hipW - legGap) / 2;
  const foot = Math.min(3, legW * 0.55);
  const armW = 4.5 + widthScale * 3;

  const torso = `
    M ${cx - shoulderW} ${shoulderY}
    Q ${cx} ${shoulderY - 7} ${cx + shoulderW} ${shoulderY}
    C ${cx + shoulderW + 3} ${shoulderY + 7}, ${cx + waistW + 2} ${waistY - 10}, ${cx + waistW} ${waistY}
    C ${cx + waistW - 1} ${waistY + 5}, ${cx + hipW} ${hipY - 5}, ${cx + hipW} ${hipY}
    L ${cx + legGap / 2 + legW} ${legBottomY - foot}
    Q ${cx + legGap / 2 + legW} ${legBottomY}, ${cx + legGap / 2 + legW - foot} ${legBottomY}
    L ${cx + legGap / 2 + 1} ${legBottomY}
    L ${cx + legGap / 2} ${hipY + 6}
    L ${cx - legGap / 2} ${hipY + 6}
    L ${cx - legGap / 2 - 1} ${legBottomY}
    L ${cx - legGap / 2 - legW + foot} ${legBottomY}
    Q ${cx - legGap / 2 - legW} ${legBottomY}, ${cx - legGap / 2 - legW} ${legBottomY - foot}
    L ${cx - hipW} ${hipY}
    C ${cx - hipW} ${hipY - 5}, ${cx - waistW + 1} ${waistY + 5}, ${cx - waistW} ${waistY}
    C ${cx - waistW - 2} ${waistY - 10}, ${cx - shoulderW - 3} ${shoulderY + 7}, ${cx - shoulderW} ${shoulderY}
    Z`;

  return `<svg viewBox="0 0 60 80" width="46" height="60">
    <line x1="${cx - shoulderW + 3}" y1="${shoulderY + 1}" x2="${cx - shoulderW - 1}" y2="${waistY + 2}" stroke="#9fb0c3" stroke-width="${armW + 2}" stroke-linecap="round"/>
    <line x1="${cx + shoulderW - 3}" y1="${shoulderY + 1}" x2="${cx + shoulderW + 1}" y2="${waistY + 2}" stroke="#9fb0c3" stroke-width="${armW + 2}" stroke-linecap="round"/>
    <line x1="${cx - shoulderW + 3}" y1="${shoulderY + 1}" x2="${cx - shoulderW - 1}" y2="${waistY + 2}" stroke="#c3d2e3" stroke-width="${armW}" stroke-linecap="round"/>
    <line x1="${cx + shoulderW - 3}" y1="${shoulderY + 1}" x2="${cx + shoulderW + 1}" y2="${waistY + 2}" stroke="#c3d2e3" stroke-width="${armW}" stroke-linecap="round"/>

function renderBMI(bmi) {

// ===== 형색성정: 성향/면색/붉은기/기타/안진 (모두 원장님이 진료 중 직접 판단해 표시, 자동 아님) =====
// 주증상/메모와 함께 doctorNotes에 담겨 "저장" 버튼을 누르면 구글시트에 저장됩니다.
const ANJIN_ITEMS = [
  '상완 이두근 압통', '상완 삼두근 압통',
  '심하 좁은부위 압통', '심하 넓은부위 압통',
  '우 협하 압통', '좌 협하 압통',
  '늑골들림', '복직근 경결 압통',
  '우 제하 압통', '좌 제하 압통',
  '복피 찰과 발적', '비복근 압통',
  '경골상 함요 부종'
];

function refreshHSS() {
  const el = document.getElementById('hss-body');
  if (el) el.innerHTML = renderHSSBody();
}

function setDotField(field, idx) {
  doctorNotes[field] = doctorNotes[field] === idx ? null : idx;
  refreshHSS();
}
function setTagField(field, val) {
  doctorNotes[field] = doctorNotes[field] === val ? null : val;
  refreshHSS();
}
function toggleGita(val) {
  const i = doctorNotes.gita.indexOf(val);
  if (i > -1) doctorNotes.gita.splice(i, 1);
  else doctorNotes.gita.push(val);
  refreshHSS();
}
function setAnjinStar(name, star) {
  doctorNotes.anjin[name] = doctorNotes.anjin[name] === star ? 0 : star;
  refreshHSS();
}

function renderDotScale(field, leftLabel, rightLabel) {
  const cur = doctorNotes[field];
  let h = `<span class="end-label">${leftLabel}</span>`;
  for (let i = 0; i < 7; i++) {
    const act = cur === i ? ' active' : '';
    h += `<div class="dot-btn${act}" onclick="setDotField('${field}',${i})"></div>`;
  }
  h += `<span class="end-label right">${rightLabel}</span>`;
  return h;
}

function renderHSSBody() {
  let h = '<div class="hss-left">';
  h += `<div class="hss-sub">· 성향</div><div class="dot-scale">${renderDotScale('tendency', '양적', '음적')}</div>`;
  h += `<div class="hss-sub">· 면색</div><div class="dot-scale">${renderDotScale('myunsaek', '짙은편', '옅은편')}</div>`;

  h += `<div class="hss-sub">· 붉은기</div><div class="tag-group">`;
  ['약간그렇다', '그렇다', '매우그렇다'].forEach(t => {
    const act = doctorNotes.bulgeun === t ? ' active' : '';
    h += `<div class="tag-btn${act}" onclick="setTagField('bulgeun','${t}')">${t}</div>`;
  });
  h += `</div>`;

  h += `<div class="hss-sub">· 기타(선택)</div><div class="tag-group">`;
  ['미간주름', '입술건조', '안구황색침착'].forEach(t => {
    const act = doctorNotes.gita.includes(t) ? ' active' : '';
    h += `<div class="tag-btn${act}" onclick="toggleGita('${t}')">${t}</div>`;
  });
  h += `</div></div>`; // hss-left

  h += `<div class="hss-right"><div class="anjin-title">· 안진</div><div class="anjin-grid">`;
  ANJIN_ITEMS.forEach(name => {
    const stars = doctorNotes.anjin[name] || 0;
    h += `<div class="anjin-item"><span class="aj-name">${esc(name)}</span><div class="star-group">`;
    for (let s = 1; s <= 3; s++) {
      const on = s <= stars ? ' on' : '';
      h += `<span class="star-btn${on}" onclick="setAnjinStar('${escJsAttr(name)}',${s})">&#9733;</span>`;
    }
    h += `</div></div>`;
  });
  h += `</div></div>`; // hss-right
  return h;
}

function renderHSS() {
  return `<div class="hss-section">
    <h3>형색성정</h3>
    <div class="sub">자동 계산이 아니라, 원장님이 진료 중 직접 판단해 표시하는 항목입니다.</div>
    <div class="hss-two" id="hss-body">${renderHSSBody()}</div>
  </div>`;
}

// ===== 문진 답변 수정 (환자가 잘못 표현한 부분을 원장이 직접 고칠 수 있도록) =====
// questions.js 의 Q / visibleQ() / buildSummary() 를 그대로 사용하고, 전역 answers/selectedGender 를
// 현재 열어본 환자의 답변으로 채운 뒤 실제 라디오버튼/체크박스로 그려줍니다.

// 옵션 문자열을 onclick="..." 안의 JS 문자열로 안전하게 넣기 위한 이스케이프 (index.html의 esc()와 동일)
function escJsAttr(s) { return String(s).replace(/'/g, "\\'").replace(/"/g, '&quot;'); }

function isEditSelected(qId, opt, type) {
  if (type === 'single') return answers[qId] === opt;
  return (answers[qId] || []).includes(opt);
}

// docs/index.html 의 pick()과 동일한 선택/토글 로직
function editPick(qId, val, type) {
  val = val.replace(/\\'/g, "'");
  const isNA = val === '해당없음' || val === '해당 없음';
  if (type === 'single') {
    if (answers[qId] === val) delete answers[qId];
    else answers[qId] = val;
  } else {
    if (!answers[qId]) answers[qId] = [];
    const i = answers[qId].indexOf(val);
    if (i > -1) {
      answers[qId].splice(i, 1);
    } else if (isNA) {
      answers[qId] = [val];
    } else {
      answers[qId] = answers[qId].filter(v => v !== '해당없음' && v !== '해당 없음');
      answers[qId].push(val);
    }
    if (answers[qId].length === 0) delete answers[qId];
  }
  renderDetail(selectedIdx);
}

function editToggleEmo(itemId) {
  answers[itemId] = !answers[itemId];
  if (!answers[itemId]) delete answers[itemId];
  renderDetail(selectedIdx);
}

function renderSubQuestionRow(sq) {
  const inputType = sq.type === 'multi' ? 'checkbox' : 'radio';
  let h = '';
  if (sq.title) h += `<div class="qa-sub-title">${esc(sq.title)}</div>`;
  h += `<div class="edit-opts">`;
  sq.opts.forEach(o => {
    const checked = isEditSelected(sq.id, o, sq.type);
    h += `<label class="edit-opt"><input type="${inputType}" name="edit_${sq.id}" ${checked ? 'checked' : ''} onclick="editPick('${sq.id}','${escJsAttr(o)}','${sq.type}')"> ${esc(o)}</label>`;
  });
  h += `</div>`;
  return h;
}

function renderQuestionRow(q) {
  if (q.type === 'emotion') {
    let h = `<div class="qa-row"><span class="q">${esc(q.title)}</span></div><div class="edit-opts">`;
    q.groups.forEach(g => g.items.forEach(it => {
      const checked = answers[it.id] === true;
      h += `<label class="edit-chk"><input type="checkbox" ${checked ? 'checked' : ''} onclick="editToggleEmo('${it.id}')"> ${esc(it.text)}</label>`;
    }));
    h += `</div>`;
    return h;
  }

  const inputType = q.type === 'multi' ? 'checkbox' : 'radio';
  let h = `<div class="qa-row"><span class="q">${esc(q.title)}</span></div><div class="edit-opts">`;
  q.opts.forEach(o => {
    const checked = isEditSelected(q.id, o, q.type);
    h += `<label class="edit-opt"><input type="${inputType}" name="edit_${q.id}" ${checked ? 'checked' : ''} onclick="editPick('${q.id}','${escJsAttr(o)}','${q.type}')"> ${esc(o)}</label>`;
  });
  h += `</div>`;

  if (q.sub) {
    const val = answers[q.id];
    const chosen = Array.isArray(val) ? val : (val !== undefined ? [val] : []);
    chosen.forEach(v => {
      if (q.sub[v]) {
        h += `<div class="qa-sub-block">`;
        q.sub[v].forEach(sq => { h += renderSubQuestionRow(sq); });
        h += `</div>`;
      }
    });
  }
  return h;
}

// 카테고리 카드 중 하나를 맨 앞으로 옮깁니다 (예: 감정을 형색성정 바로 다음, 문진 카드 중 맨 앞에 배치).
function moveCatToFront(cats, name) {
  const idx = cats.findIndex(c => c.name === name);
  if (idx > 0) cats.unshift(cats.splice(idx, 1)[0]);
  return cats;
}

function buildEditableCats() {
  const cats = [];
  let cur = null;
  visibleQ().forEach(q => {
    if (q.type === 'symptom_entry') return;
    if (!cur || cur.name !== q.cat) { cur = { name: q.cat, rows: [] }; cats.push(cur); }
    cur.rows.push(renderQuestionRow(q));
  });
  return moveCatToFront(cats, '감정');
}

function saveCorrections(rowNum) {
  const status = document.getElementById('save-status');
  if (status) { status.textContent = '저장 중...'; status.className = 'save-status'; }
  const payload = {
    action: 'update',
    key: adminKey,
    rowNum: rowNum,
    raw: JSON.stringify(answers),
    summary: buildSummary()
  };
  fetch(GAS_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) })
    .then(() => {
      const r = records[selectedIdx];
      if (r) { r.raw = payload.raw; r.summary = payload.summary; }
      const st = document.getElementById('save-status');
      if (st) { st.textContent = '저장되었습니다 (' + new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' }) + ')'; st.className = 'save-status ok'; }
    })
    .catch(() => {
      const st = document.getElementById('save-status');
      if (st) { st.textContent = '저장 실패 - 네트워크를 확인해주세요.'; st.className = 'save-status err'; }
    });
}

// summary 텍스트("[카테고리] 질문: 답" / "   - 세부질문: 답")를 카테고리별 카드로 변환
function parseSummary(summary) {
  const cats = [];
  let cur = null;
  (summary || '').split('\n').forEach(line => {
    if (!line.trim()) return;
    const m = line.match(/^\[(.+?)\]\s(.*)$/);
    if (m) {
      if (!cur || cur.name !== m[1]) {
        cur = { name: m[1], rows: [] };
        cats.push(cur);
      }
      const [q, a] = splitQA(m[2]);
      cur.rows.push({ type: 'main', q, a });
    } else if (line.trim().startsWith('-') && cur) {
      const content = line.trim().replace(/^-\s*/, '');
      const [q, a] = splitQA(content);
      cur.rows.push({ type: 'sub', q, a });
    }
  });
  return cats;
}

function splitQA(text) {
  const idx = text.lastIndexOf(': ');
  if (idx === -1) return [text, ''];
  return [text.slice(0, idx), text.slice(idx + 2)];
}

// ===== 주증상(CC) / 진료메모 / 처방메모 =====
// 환자가 문진 마지막에 직접 적은 증상(answers.symptoms)이 있으면 그것을 CC 카드의 시작값으로 보여주고,
// 없으면 원장님이 처음부터 채울 수 있도록 빈 카드 1개로 시작합니다.
function seedDoctorNotesFromAnswers() {
  const syms = Array.isArray(answers.symptoms) ? answers.symptoms : [];
  const cc = syms.length
    ? syms.map(s => ({
        cc: '',
        os: s.since || '',
        symptom: [s.symptom, s.how ? `(${s.how})` : ''].filter(Boolean).join(' '),
        worse: '',
        better: ''
      }))
    : [{ cc: '', os: '', symptom: '', worse: '', better: '' }];
  return { cc, memo: '', prescription: '', tendency: null, myunsaek: null, bulgeun: null, gita: [], anjin: {} };
}

// 예전 버전에서 저장된 doctorNotes(주증상/메모만 있던 시절)를 열어도 형색성정 항목이
// 비어있는 채로 안전하게 동작하도록 빠진 필드를 채워줍니다.
function normalizeDoctorNotes(n) {
  if (!n.cc || n.cc.length === 0) n.cc = [{ cc: '', os: '', symptom: '', worse: '', better: '' }];
  if (n.memo === undefined) n.memo = '';
  if (n.prescription === undefined) n.prescription = '';
  if (n.tendency === undefined) n.tendency = null;
  if (n.myunsaek === undefined) n.myunsaek = null;
  if (n.bulgeun === undefined) n.bulgeun = null;
  if (!Array.isArray(n.gita)) n.gita = [];
  if (!n.anjin || typeof n.anjin !== 'object') n.anjin = {};
  return n;
}

function ccRow(label, field, i, val, shaded) {
  return `<div class="cc-row${shaded ? ' shaded' : ''}"><span class="cc-label">${esc(label)}</span><textarea class="cc-input" oninput="updateCC(${i},'${field}',this.value)">${esc(val || '')}</textarea></div>`;
}

function renderChiefComplaints() {
  return doctorNotes.cc.map((c, i) => {
    let h = `<div class="cc-card">`;
    if (doctorNotes.cc.length > 1) h += `<div class="cc-remove" onclick="removeCC(${i})">삭제</div>`;
    h += ccRow('CC', 'cc', i, c.cc);
    h += ccRow('O/S', 'os', i, c.os, true);
    h += ccRow('증상', 'symptom', i, c.symptom);
    h += ccRow('악화요인', 'worse', i, c.worse, true);
    h += ccRow('완화요인', 'better', i, c.better);
    h += `</div>`;
    return h;
  }).join('');
}

// 텍스트 입력은 매 글자마다 다시 그리면 커서 위치가 튀므로, 값만 조용히 갱신하고 화면은 다시 그리지 않습니다.
function updateCC(i, field, val) { if (doctorNotes.cc[i]) doctorNotes.cc[i][field] = val; }

function addCC() {
  doctorNotes.cc.push({ cc: '', os: '', symptom: '', worse: '', better: '' });
  document.getElementById('cc-list').innerHTML = renderChiefComplaints();
}
function removeCC(i) {
  doctorNotes.cc.splice(i, 1);
  if (doctorNotes.cc.length === 0) doctorNotes.cc.push({ cc: '', os: '', symptom: '', worse: '', better: '' });
  document.getElementById('cc-list').innerHTML = renderChiefComplaints();
}

function toggleBig(id, btn) {
  const el = document.getElementById(id);
  if (!el) return;
  const isBig = el.classList.toggle('big');
  if (btn) btn.textContent = isBig ? '작게보기' : '크게보기';
}

function saveNotes(rowNum) {
  const status = document.getElementById('notes-save-status');
  if (status) { status.textContent = '저장 중...'; status.className = 'save-status'; }
  const payload = { action: 'update', key: adminKey, rowNum: rowNum, notes: JSON.stringify(doctorNotes) };
  fetch(GAS_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) })
    .then(() => {
      const r = records[selectedIdx];
      if (r) r.doctorNotes = payload.notes;
      const st = document.getElementById('notes-save-status');
      if (st) { st.textContent = '저장되었습니다 (' + new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' }) + ')'; st.className = 'save-status ok'; }
    })
    .catch(() => {
      const st = document.getElementById('notes-save-status');
      if (st) { st.textContent = '저장 실패 - 네트워크를 확인해주세요.'; st.className = 'save-status err'; }
    });
}

function renderSidePanel(rowNum) {
  let h = '';
  h += `<div class="side-box">
    <div class="side-box-hdr"><h3>주증상</h3><button class="side-btn" onclick="addCC()">CC 추가</button></div>
    <div id="cc-list">${renderChiefComplaints()}</div>
  </div>`;
  h += `<div class="side-box">
    <div class="side-box-hdr"><h3>진료메모</h3><button class="side-btn ghost" onclick="toggleBig('memo-note', this)">크게보기</button></div>
    <textarea class="memo-textarea" id="memo-note" oninput="doctorNotes.memo=this.value" placeholder="진료 중 원장님 의견을 적어주세요...">${esc(doctorNotes.memo || '')}</textarea>
  </div>`;
  h += `<div class="side-box">
    <div class="side-box-hdr"><h3>처방메모</h3><button class="side-btn ghost" onclick="toggleBig('memo-presc', this)">크게보기</button></div>
    <textarea class="memo-textarea" id="memo-presc" oninput="doctorNotes.prescription=this.value" placeholder="처방 내용을 적어주세요...">${esc(doctorNotes.prescription || '')}</textarea>
  </div>`;
  h += `<div class="save-bar">
    <button onclick="saveNotes(${rowNum})">저장 (형색성정·주증상·메모)</button>
    <span class="save-status" id="notes-save-status"></span>
  </div>`;
  return h;
}

function renderDetail(i) {
  selectedIdx = i;
  renderList();
  const r = records[i];

  let editableAnswers = null;
  try { editableAnswers = r.raw ? JSON.parse(r.raw) : null; } catch (e) { editableAnswers = null; }

  // 환자를 새로 열었을 때만 원본 데이터로 초기화합니다. 같은 환자를 다시 그릴 때는
  // (문진 답변을 고치거나 주증상/메모를 입력한 내용이 지워지지 않도록) 그대로 유지합니다.
  if (editingRowNum !== r.rowNum) {
    answers = editableAnswers || {};
    selectedGender = r.gender || null;
    let parsedNotes = null;
    try { parsedNotes = r.doctorNotes ? JSON.parse(r.doctorNotes) : null; } catch (e) { parsedNotes = null; }
    doctorNotes = normalizeDoctorNotes(parsedNotes || seedDoctorNotesFromAnswers());
    // 이전 버전에서는 성향을 이 브라우저의 localStorage에만 저장했습니다.
    // 아직 구글시트에 저장된 성향 값이 없다면, 예전에 로컬에 남겨둔 값을 이어서 씁니다.
    if (doctorNotes.tendency === null) {
      const legacy = localStorage.getItem('tendency_' + r.rowNum);
      if (legacy !== null) doctorNotes.tendency = parseInt(legacy, 10);
    }
    editingRowNum = r.rowNum;
  }

  let h = '';
  h += `<div class="patient-card">
    <div class="name">${esc(r.name || '(이름없음)')}${r.gender ? `<span class="gender-tag">${esc(r.gender)}</span>` : ''}</div>
    <div class="field">전화번호<b>${esc(r.phone || '-')}</b></div>
    <div class="field">생년월일<b>${esc(r.birthDate || '-')}</b></div>
    <div class="field">키 / 몸무게<b>${esc(r.height || '-')}cm / ${esc(r.weight || '-')}kg</b></div>
    <div class="field">제출일시<b>${r.submittedAt ? new Date(r.submittedAt).toLocaleString('ko-KR') : '-'}</b></div>
  </div>`;

  const bmi = calcBMI(r.height, r.weight);
  h += `<div class="bmi-section">
    <h3>체형 분석 (BMI 자동 계산)</h3>
    <div class="bmi-bar">${renderBMI(bmi)}</div>
    ${bmi ? `<div class="bmi-note">BMI ${bmi.toFixed(1)}</div>` : `<div class="bmi-note">키/몸무게 정보가 없어 계산할 수 없습니다.</div>`}
  </div>`;

  h += renderHSS();

  if (r.symptoms) {
    h += `<div class="symptom-box"><h3>환자가 직접 적은 증상</h3><pre>${esc(r.symptoms)}</pre></div>`;
  }

  if (editableAnswers) {
    // 실제 라디오버튼/체크박스로 문진 답변을 그려서, 원장님이 진료 중 환자와 함께 보면서
    // 잘못 표현된 답변이 있으면 바로 클릭해서 고칠 수 있게 합니다.
    h += `<div class="save-bar">
      <button onclick="saveCorrections(${r.rowNum})">수정 내용 저장</button>
      <span class="save-status" id="save-status"></span>
    </div>`;

    const cats = buildEditableCats();
    h += `<div class="cat-grid">`;
    cats.forEach(cat => {
      h += `<div class="cat-card"><div class="cat-hdr">${esc(cat.name)}</div><div class="cat-body">${cat.rows.join('')}</div></div>`;
    });
    h += `</div>`;
  } else {
    // raw 데이터가 없거나 손상된 옛 기록은 예전처럼 읽기 전용 텍스트로 보여줍니다.
    const cats = moveCatToFront(parseSummary(r.summary), '감정');
    h += `<div class="cat-grid">`;
    cats.forEach(cat => {
      h += `<div class="cat-card"><div class="cat-hdr">${esc(cat.name)}</div><div class="cat-body">`;
      cat.rows.forEach(row => {
        if (row.type === 'main') {
          h += `<div class="qa-row"><span class="q">${esc(row.q)}</span><br><span class="a">${esc(row.a)}</span></div>`;
        } else {
          h += `<div class="qa-sub"><b>${esc(row.q)}</b>: ${esc(row.a)}</div>`;
        }
      });
      h += `</div></div>`;
    });
    h += `</div>`;
  }

  h += `<div class="raw-toggle" onclick="this.nextElementSibling.style.display = this.nextElementSibling.style.display==='block' ? 'none' : 'block'">원본 데이터 보기(백업용)</div>`;
  h += `<div class="raw-box">${esc(r.raw || '')}</div>`;

  const sideH = renderSidePanel(r.rowNum);

  document.getElementById('detail').innerHTML =
    `<div class="two-col"><div class="col-main">${h}</div><div class="col-side">${sideH}</div></div>`;
}
</script>
</body>
</html>
