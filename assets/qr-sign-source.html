<title>청춘한의원 사전문진 QR코드</title>
<style>
  :root {
    --bg: #eef1f8;
    --surface: #ffffff;
    --ink: #1b2438;
    --muted: #6b7488;
    --accent: #3a6fd8;
    --accent-2: #7c5cd6;
    --border: #dde3f0;
    --qr-frame: #ffffff;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #10141f;
      --surface: #171d2c;
      --ink: #eef1f8;
      --muted: #98a2b8;
      --accent: #7ea2fb;
      --accent-2: #b39dfb;
      --border: #2a3348;
      --qr-frame: #ffffff;
    }
  }
  :root[data-theme="dark"] {
    --bg: #10141f;
    --surface: #171d2c;
    --ink: #eef1f8;
    --muted: #98a2b8;
    --accent: #7ea2fb;
    --accent-2: #b39dfb;
    --border: #2a3348;
    --qr-frame: #ffffff;
  }
  :root[data-theme="light"] {
    --bg: #eef1f8;
    --surface: #ffffff;
    --ink: #1b2438;
    --muted: #6b7488;
    --accent: #3a6fd8;
    --accent-2: #7c5cd6;
    --border: #dde3f0;
    --qr-frame: #ffffff;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
    background:
      radial-gradient(1200px 600px at 15% -10%, color-mix(in srgb, var(--accent-2) 14%, transparent), transparent),
      radial-gradient(1000px 700px at 100% 110%, color-mix(in srgb, var(--accent) 12%, transparent), transparent),
      var(--bg);
    color: var(--ink);
    font-family: 'Apple SD Gothic Neo', 'Pretendard', 'Malgun Gothic', -apple-system, sans-serif;
  }

  .card {
    width: 100%;
    max-width: 420px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 28px;
    padding: 44px 36px 36px;
    box-shadow: 0 24px 60px -20px rgba(20, 30, 60, 0.25);
    text-align: center;
  }

  .brand {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.14em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 18px;
  }
  .brand::before, .brand::after {
    content: "";
    width: 16px;
    height: 1px;
    background: color-mix(in srgb, var(--accent) 50%, transparent);
  }

  h1 {
    margin: 0 0 8px;
    font-size: 24px;
    line-height: 1.4;
    font-weight: 800;
    letter-spacing: -0.01em;
    text-wrap: balance;
  }
  h1 em {
    font-style: normal;
    background: linear-gradient(120deg, var(--accent), var(--accent-2));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }

  .sub {
    margin: 0 0 28px;
    font-size: 14px;
    color: var(--muted);
    line-height: 1.6;
  }

  .qr-frame {
    position: relative;
    width: 240px;
    height: 240px;
    margin: 0 auto 22px;
    padding: 16px;
    border-radius: 20px;
    background: var(--qr-frame);
    border: 1px solid var(--border);
    box-shadow: inset 0 0 0 1px rgba(20, 30, 60, 0.03);
  }
  .qr-frame img {
    width: 100%;
    height: 100%;
    display: block;
    image-rendering: pixelated;
  }
  .corner {
    position: absolute;
    width: 20px;
    height: 20px;
    border: 3px solid var(--accent);
    opacity: 0.8;
  }
  .corner.tl { top: -3px; left: -3px; border-right: none; border-bottom: none; border-radius: 8px 0 0 0; }
  .corner.tr { top: -3px; right: -3px; border-left: none; border-bottom: none; border-radius: 0 8px 0 0; }
  .corner.bl { bottom: -3px; left: -3px; border-right: none; border-top: none; border-radius: 0 0 0 8px; }
  .corner.br { bottom: -3px; right: -3px; border-left: none; border-top: none; border-radius: 0 0 8px 0; }

  .steps {
    display: flex;
    flex-direction: column;
    gap: 10px;
    text-align: left;
    margin: 24px 0;
    padding: 18px 18px;
    background: color-mix(in srgb, var(--accent) 6%, var(--surface));
    border: 1px solid var(--border);
    border-radius: 16px;
  }
  .step {
    display: flex;
    gap: 10px;
    font-size: 13.5px;
    line-height: 1.5;
    color: var(--ink);
  }
  .step b {
    flex-shrink: 0;
    color: var(--accent);
    font-weight: 800;
  }

  .url-chip {
    display: inline-block;
    max-width: 100%;
    font-family: ui-monospace, 'SFMono-Regular', Consolas, monospace;
    font-size: 12px;
    color: var(--muted);
    background: color-mix(in srgb, var(--ink) 5%, transparent);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 8px 16px;
    word-break: break-all;
    letter-spacing: 0.01em;
  }

  .footnote {
    margin-top: 18px;
    font-size: 11.5px;
    color: var(--muted);
    letter-spacing: 0.02em;
  }

  @media print {
    body {
      background: #fff !important;
      padding: 0;
      min-height: auto;
    }
    .card {
      box-shadow: none;
      border: 1px solid #ccc;
      max-width: 100%;
      width: 400px;
      margin: 24px auto;
    }
  }
</style>
